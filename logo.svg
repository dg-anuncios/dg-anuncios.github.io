<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50" width="300" height="50" preserveAspectRatio="xMinYMid meet" role="img" aria-label="DG-Anúncios">
  <!-- Fundo transparente -->
  <rect width="300" height="50" fill="none"/>

  <!-- Ícone circular laranja -->
  <circle cx="25" cy="25" r="18" fill="#ff7f00"/>

  <!-- Letras "DG" dentro do círculo -->
  <text x="25" y="31" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="13"
        fill="#ffffff"
        style="letter-spacing:0.5px;">
    DG
  </text>

  <!-- Texto principal da marca -->
  <text x="60" y="30"
        font-family="Poppins, Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="22"
        fill="#ffffff"
        style="letter-spacing:-0.3px;">
    Anúncios
  </text>

  <!-- Slogan -->
  <text x="60" y="44"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="400"
        font-size="11"
        fill="#ffffff">
    Conectando você às melhores anúncios
  </text>
</svg>